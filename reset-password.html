<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Family Hospital</title>
    <link rel="icon" type="image/x-icon" href="assets/logo.png">
    <link rel="stylesheet" href="css/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0F4C81 0%, #00355F 50%, #1E333C 100%);
            padding: 40px 20px;
        }
        .auth-container { width: 100%; max-width: 440px; }
        .auth-card {
            background: #fff;
            border-radius: 12px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo-text { font-family: 'Public Sans', sans-serif; font-size: 24px; font-weight: 700; color: #0F4C81; }
        .auth-logo-text span { color: #00796B; }
        .auth-title { font-family: 'Public Sans', sans-serif; font-size: 22px; font-weight: 700; color: #00355F; text-align: center; margin-bottom: 6px; }
        .auth-subtitle { font-size: 14px; color: #727780; text-align: center; margin-bottom: 28px; }
        .auth-form-group { margin-bottom: 20px; }
        .auth-label { display: block; font-size: 13px; font-weight: 600; color: #00355F; margin-bottom: 6px; }
        .auth-input-wrapper { position: relative; }
        .auth-input-wrapper i.field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #727780; font-size: 14px; pointer-events: none; }
        .auth-input {
            width: 100%; height: 48px; padding: 0 42px 0 42px;
            border: 1px solid #C2C7D1; border-radius: 6px;
            font-family: 'Inter', sans-serif; font-size: 14px; color: #071E27;
            background: #fff; outline: none; transition: all 0.2s; box-sizing: border-box;
        }
        .auth-input:focus { border-color: #0F4C81; box-shadow: 0 0 0 3px rgba(15,76,129,0.1); }
        .auth-input.error { border-color: #BA1A1A; }
        .auth-input-wrapper .toggle-password {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            cursor: pointer; background: none; border: none; padding: 4px; color: #727780; font-size: 14px;
        }
        .auth-error { font-size: 12px; color: #BA1A1A; margin-top: 4px; display: none; }
        .auth-error.visible { display: block; }
        .auth-btn {
            width: 100%; height: 48px; border: none; border-radius: 6px;
            background: #0F4C81; color: #fff; font-family: 'Inter', sans-serif;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .auth-btn:hover { background: #00355F; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,76,129,0.3); }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .auth-alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; display: none; align-items: center; gap: 10px; }
        .auth-alert.visible { display: flex; }
        .auth-alert.error { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
        .auth-alert.success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
        .strength-bars { display: flex; gap: 4px; margin-top: 8px; }
        .strength-bar { flex: 1; height: 4px; background: #E2E8F0; border-radius: 2px; transition: background 0.2s; }
        .strength-bar.active.weak { background: #EF4444; }
        .strength-bar.active.medium { background: #F59E0B; }
        .strength-bar.active.strong { background: #22C55E; }
        .auth-back-home { text-align: center; margin-top: 24px; }
        .auth-back-home a { color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .auth-back-home a:hover { color: #fff; }
        @media (max-width: 480px) { .auth-card { padding: 32px 24px; } }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <img src="assets/logo.png" alt="Family Hospital" onerror="this.style.display='none';" style="height:48px;margin-bottom:12px;">
                    <div class="auth-logo-text">Family<span>Hospital</span></div>
                </div>

                <h1 class="auth-title" id="page-title">Reset Password</h1>
                <p class="auth-subtitle" id="page-subtitle">Choose a new password for your account</p>

                <div class="auth-alert" id="auth-alert">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="alert-message"></span>
                </div>

                <form id="reset-form" novalidate>
                    <div class="auth-form-group">
                        <label class="auth-label">New Password</label>
                        <div class="auth-input-wrapper">
                            <input type="password" class="auth-input" id="new-password" placeholder="Min. 8 characters" autocomplete="new-password">
                            <i class="fa-solid fa-lock field-icon"></i>
                            <button type="button" class="toggle-password" aria-label="Toggle password">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="strength-bars">
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                        </div>
                        <div class="auth-error" id="err-password">Password must be at least 8 characters</div>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label">Confirm Password</label>
                        <div class="auth-input-wrapper">
                            <input type="password" class="auth-input" id="confirm-password" placeholder="Repeat your new password" autocomplete="new-password">
                            <i class="fa-solid fa-lock field-icon"></i>
                            <button type="button" class="toggle-password" aria-label="Toggle confirm password">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="auth-error" id="err-confirm">Passwords do not match</div>
                    </div>

                    <button type="submit" class="auth-btn" id="reset-btn">
                        <span>Set New Password</span>
                        <i class="fa-solid fa-key"></i>
                    </button>
                </form>
            </div>

            <div class="auth-back-home">
                <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var API = '/api';
        var token = new URLSearchParams(window.location.search).get('token');
        var alertBox = document.getElementById('auth-alert');
        var alertMsg = document.getElementById('alert-message');
        var resetForm = document.getElementById('reset-form');
        var resetBtn = document.getElementById('reset-btn');

        if (!token) {
            showAlert('Invalid or missing reset link. Please request a new one.', 'error');
            resetForm.style.display = 'none';
        }

        document.querySelectorAll('.toggle-password').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var input = this.parentElement.querySelector('input');
                var icon = this.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });

        document.getElementById('new-password').addEventListener('input', function() {
            var val = this.value;
            var bars = document.querySelectorAll('.strength-bar');
            var strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;
            var cls = ['', 'weak', 'medium', 'medium', 'strong'];
            bars.forEach(function(bar, i) {
                bar.className = 'strength-bar';
                if (i < strength) bar.classList.add('active', cls[strength]);
            });
        });

        function showAlert(msg, type) {
            alertBox.className = 'auth-alert visible ' + type;
            alertMsg.textContent = msg;
            var icon = alertBox.querySelector('i');
            if (icon) icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
        }

        resetForm.addEventListener('submit', function(e) {
            e.preventDefault();
            var password = document.getElementById('new-password').value;
            var confirm = document.getElementById('confirm-password').value;
            var valid = true;

            document.getElementById('new-password').classList.remove('error');
            document.getElementById('confirm-password').classList.remove('error');
            document.getElementById('err-password').classList.remove('visible');
            document.getElementById('err-confirm').classList.remove('visible');

            if (!password || password.length < 8) {
                document.getElementById('new-password').classList.add('error');
                document.getElementById('err-password').classList.add('visible');
                valid = false;
            }
            if (password !== confirm) {
                document.getElementById('confirm-password').classList.add('error');
                document.getElementById('err-confirm').classList.add('visible');
                valid = false;
            }
            if (!valid) return;

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';

            fetch(API + '/users/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, password: password })
            })
            .then(function(r) {
                if (!r.ok) return r.json().then(function(d) { throw new Error(d.message); });
                return r.json();
            })
            .then(function(data) {
                showAlert(data.message, 'success');
                resetForm.style.display = 'none';
                document.getElementById('page-title').textContent = 'Password Updated!';
                document.getElementById('page-subtitle').textContent = 'You can now sign in with your new password';
                setTimeout(function() { window.location.href = 'login.html'; }, 2500);
            })
            .catch(function(err) {
                showAlert(err.message || 'Reset failed. Please try again.', 'error');
            })
            .finally(function() {
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<span>Set New Password</span><i class="fa-solid fa-key"></i>';
            });
        });
    })();
    </script>
</body>
</html>
