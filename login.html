<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Family Hospital</title>
    <link rel="icon" type="image/x-icon" href="assets/logo.png">
    <link rel="stylesheet" href="css/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0F4C81 0%, #00355F 50%, #1E333C 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 150%;
            background: radial-gradient(ellipse, rgba(0, 121, 107, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-page::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 60%;
            height: 100%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 2;
        }

        .auth-card {
            background: #fff;
            border-radius: 12px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo img {
            height: 48px;
            margin: 0 auto 16px;
        }

        .auth-logo-text {
            font-family: 'Public Sans', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #0F4C81;
        }

        .auth-logo-text span {
            color: #00796B;
        }

        .auth-title {
            font-family: 'Public Sans', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #00355F;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: #727780;
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-form-group {
            margin-bottom: 20px;
        }

        .auth-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #00355F;
            margin-bottom: 6px;
        }

        .auth-input-wrapper {
            position: relative;
        }

        .auth-input-wrapper i.field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #727780;
            font-size: 14px;
            transition: color 0.2s;
            pointer-events: none;
        }

        .auth-input {
            width: 100%;
            height: 48px;
            padding: 0 14px 0 42px;
            border: 1px solid #C2C7D1;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #071E27;
            background: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .auth-input:focus {
            border-color: #0F4C81;
            box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.1);
        }

        .auth-input:focus ~ i.field-icon {
            color: #0F4C81;
        }

        .auth-input-wrapper .toggle-password {
            position: absolute;
            right: 14px;
            left: auto;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            color: #727780;
            font-size: 14px;
            transition: color 0.2s;
        }

        .auth-input-wrapper .toggle-password:hover {
            color: #0F4C81;
        }

        .auth-input.error {
            border-color: #BA1A1A;
        }

        .auth-error {
            font-size: 12px;
            color: #BA1A1A;
            margin-top: 4px;
            display: none;
        }

        .auth-error.visible {
            display: block;
        }

        .auth-remember {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .auth-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .auth-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #0F4C81;
            cursor: pointer;
        }

        .auth-checkbox span {
            font-size: 13px;
            color: #42474F;
        }

        .auth-forgot {
            font-size: 13px;
            color: #0F4C81;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-forgot:hover {
            color: #00355F;
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 6px;
            background: #0F4C81;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-btn:hover {
            background: #00355F;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 76, 129, 0.3);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-btn i {
            font-size: 14px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #42474F;
        }

        .auth-footer a {
            color: #0F4C81;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #00355F;
            text-decoration: underline;
        }

        .auth-alert {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .auth-alert.visible {
            display: flex;
        }

        .auth-alert.error {
            background: #FEF2F2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }

        .auth-alert.success {
            background: #F0FDF4;
            color: #166534;
            border: 1px solid #BBF7D0;
        }

        .auth-alert i {
            font-size: 16px;
            flex-shrink: 0;
        }

        .auth-back-home {
            text-align: center;
            margin-top: 24px;
        }

        .auth-back-home a {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .auth-back-home a:hover {
            color: #fff;
        }

        .auth-patient-benefits {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
        }

        .auth-benefit {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #727780;
        }

        .auth-benefit i {
            color: #00796B;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-title {
                font-size: 20px;
            }

            .auth-patient-benefits {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
     <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <img src="asset/logo.png" alt="Family Hospital" onerror="this.style.display='none';">
                    <div class="auth-logo-text">Family<span>Hospital</span></div>
                </div>

                <h1 class="auth-title">Patient Login</h1>
                <p class="auth-subtitle">Sign in to manage your appointments</p>

                <div class="auth-alert" id="auth-alert">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="alert-message"></span>
                </div>

                <form id="login-form" novalidate>
                    <div class="auth-form-group">
                        <label class="auth-label">Email Address</label>
                        <div class="auth-input-wrapper">
                            <input type="email" class="auth-input" id="login-email" placeholder="patient@example.com" required>
                            <i class="fa-solid fa-envelope field-icon"></i>
                        </div>
                        <div class="auth-error" id="err-email">Please enter a valid email address</div>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label">Password</label>
                        <div class="auth-input-wrapper">
                            <input type="password" class="auth-input" id="login-password" placeholder="Enter your password" required>
                            <i class="fa-solid fa-lock field-icon"></i>
                            <button type="button" class="toggle-password" id="toggle-pass" aria-label="Toggle password">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="auth-error" id="err-password">Password is required</div>
                    </div>

                    <div class="auth-remember">
                        <label class="auth-checkbox">
                            <input type="checkbox" id="remember-me">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="auth-forgot" id="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="auth-btn" id="login-btn">
                        <span>Sign In</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <div class="auth-patient-benefits">
                    <div class="auth-benefit"><i class="fa-solid fa-calendar-check"></i> Book appointments</div>
                    <div class="auth-benefit"><i class="fa-solid fa-clock-rotate-left"></i> View history</div>
                    <div class="auth-benefit"><i class="fa-solid fa-bell"></i> Get reminders</div>
                </div>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up here</a>
                </div>
            </div>

            <div class="auth-back-home">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var API = '/api';
        var form = document.getElementById('login-form');
        var loginBtn = document.getElementById('login-btn');
        var alertBox = document.getElementById('auth-alert');
        var alertMsg = document.getElementById('alert-message');

        document.getElementById('toggle-pass').addEventListener('click', function() {
            var passInput = document.getElementById('login-password');
            var icon = this.querySelector('i');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        document.querySelectorAll('.auth-input').forEach(function(input) {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                var errEl = this.closest('.auth-form-group').querySelector('.auth-error');
                if (errEl) errEl.classList.remove('visible');
                hideAlert();
            });
        });

        function showAlert(message, type) {
            alertBox.className = 'auth-alert visible ' + type;
            alertMsg.textContent = message;
        }

        function hideAlert() {
            alertBox.classList.remove('visible');
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            hideAlert();

            var email = document.getElementById('login-email').value.trim();
            var password = document.getElementById('login-password').value;
            var valid = true;

            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailPattern.test(email)) {
                document.getElementById('login-email').classList.add('error');
                document.getElementById('err-email').classList.add('visible');
                valid = false;
            }

            if (!password) {
                document.getElementById('login-password').classList.add('error');
                document.getElementById('err-password').classList.add('visible');
                valid = false;
            }

            if (!valid) return;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

            fetch(API + '/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function(r) {
                if (!r.ok) return r.json().then(function(data) { throw new Error(data.message || 'Login failed'); });
                return r.json();
            })
            .then(function(data) {
                localStorage.setItem('userToken', data.token);
                if (data.user) {
                    localStorage.setItem('userName', data.user.firstName || data.user.name || '');
                    localStorage.setItem('userEmail', data.user.email || '');
                }
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(function() {
                    var redirect = localStorage.getItem('redirectAfterLogin') || 'index.html';
                    localStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirect;
                }, 800);
            })
            .catch(function(err) {
                showAlert(err.message, 'error');
            })
            .finally(function() {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Sign In</span><i class="fa-solid fa-arrow-right"></i>';
            });
        });

        document.getElementById('forgot-link').addEventListener('click', function(e) {
            e.preventDefault();
            showAlert('Password reset feature coming soon.', 'error');
        });
    })();
    </script>
</body>
</html>
