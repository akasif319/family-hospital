<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - Family Hospital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/css/fontawesome/css/all.min.css">
    <style>
        .appointments-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-header h1 {
            color: #0f4c81;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .page-header p {
            color: #64748b;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #3b82f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .card-info h3 {
            margin: 0 0 10px 0;
            color: #1e293b;
            font-size: 20px;
        }
        .card-info p {
            margin: 4px 0;
            color: #475569;
            font-size: 14px;
        }
        .card-info p i {
            width: 20px;
            color: #3b82f6;
        }
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-confirmed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .empty-state i {
            font-size: 60px;
            color: #cbd5e1;
            margin-bottom: 20px;
        }
        .empty-state h2 {
            color: #475569;
            margin-bottom: 10px;
        }
        .empty-state a {
            display: inline-block;
            margin-top: 15px;
            background: #0f4c81;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Add your navbar here if you have a separate navbar component, 
         otherwise this will use the default body background -->
    
    <div class="appointments-container">
        <div class="page-header">
            <h1><i class="fa-solid fa-calendar-check"></i> My Appointments</h1>
            <p>Track your upcoming and past appointments.</p>
        </div>

        <div id="loading-msg" class="loading">
            <i class="fa-solid fa-spinner fa-spin"></i> Fetching your appointments...
        </div>

        <div id="appointments-list">
            <!-- Appointments will be injected here by JavaScript -->
        </div>
    </div>

    <script>
        // 1. Check if user is logged in
        const token = localStorage.getItem('userToken'); // Adjust key if you used something else during login
        
        if (!token) {
            window.location.href = '/login.html'; // Redirect to login if not authenticated
        }

        // 2. Fetch Appointments
        async function loadMyAppointments() {
            try {
                const res = await fetch('/api/appointments/my', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                const data = await res.json();
                document.getElementById('loading-msg').style.display = 'none';

                if (data.length === 0) {
                    document.getElementById('appointments-list').innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-calendar-xmark"></i>
                            <h2>No Appointments Found</h2>
                            <p>You haven't booked any appointments yet.</p>
                            <a href="/appointment.html">Book an Appointment</a>
                        </div>
                    `;
                    return;
                }

                let html = '';
                data.forEach(app => {
                    // Format date nicely
                    const dateObj = new Date(app.date);
                    const formattedDate = dateObj.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
                    
                    // Handle status colors
                    let statusClass = 'status-pending';
                    if (app.status === 'Confirmed') statusClass = 'status-confirmed';
                    if (app.status === 'Cancelled') statusClass = 'status-cancelled';

                    html += `
                        <div class="card">
                            <div class="card-info">
                                <h3>Dr. ${app.doctorName || 'N/A'}</h3>
                                <p><i class="fa-solid fa-calendar"></i> ${formattedDate}</p>
                                <p><i class="fa-solid fa-clock"></i> ${app.timeSlot || 'N/A'}</p>
                                <p><i class="fa-solid fa-stethoscope"></i> ${app.department || 'General'}</p>
                            </div>
                            <span class="status-badge ${statusClass}">${app.status || 'Pending'}</span>
                        </div>
                    `;
                });

                document.getElementById('appointments-list').innerHTML = html;

            } catch (error) {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('appointments-list').innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-circle-exclamation" style="color: #ef4444;"></i>
                        <h2>Failed to Load</h2>
                        <p>There was an error fetching your appointments.</p>
                    </div>
                `;
            }
        }

        // Run function when page loads
        loadMyAppointments();
    </script>
</body>
</html>
