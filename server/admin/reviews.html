<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews — Family Hospital Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>Family<span>Hospital</span></h2>
                <p>Admin Panel</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
                <a href="doctors.html"><i class="fa-solid fa-user-doctor"></i> Doctors</a>
                <a href="appointments.html"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
                <a href="reviews.html" class="active"><i class="fa-solid fa-star"></i> Reviews</a>
                <a href="services.html"><i class="fa-solid fa-list-check"></i> Services</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Manage Reviews</h1>
                <div style="display:flex;gap:10px;">
                    <select class="form-select" id="status-filter" style="width:auto;height:38px;font-size:13px;">
                        <option value="all">All Reviews</option>
                        <option value="approved">Approved</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
            </div>

            <div class="stats-grid" style="margin-bottom:24px;">
                <div class="stat-card">
                    <div class="stat-card-icon blue"><i class="fa-solid fa-star"></i></div>
                    <h3 id="stat-total">0</h3>
                    <p>Total</p>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon teal"><i class="fa-solid fa-circle-check"></i></div>
                    <h3 id="stat-approved">0</h3>
                    <p>Approved</p>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon orange"><i class="fa-solid fa-clock"></i></div>
                    <h3 id="stat-pending">0</h3>
                    <p>Pending</p>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon" style="background:#FFF3E0;color:#E65100;"><i class="fa-solid fa-trophy"></i></div>
                    <h3 id="stat-avg">0.0</h3>
                    <p>Avg Rating</p>
                </div>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <h2>All Reviews (<span id="rv-count">0</span>)</h2>
                </div>
                <div id="reviews-table-wrapper">
                    <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div>
                </div>
            </div>
        </main>
    </div>

    <!-- View Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal" style="width:520px;">
            <div class="modal-header">
                <h2>Review Details</h2>
                <button class="modal-close" id="detail-modal-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="detail-body" style="max-height:none;"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="detail-close-btn">Close</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script>
    (function() {
        var API = '/api';
        var token = localStorage.getItem('adminToken');
        var allReviews = [];

        if (!token) { window.location.href = '/admin/login.html'; }

        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login.html';
        });

        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }

        function renderStarsHTML(r) {
            var h = '';
            for (var i = 1; i <= 5; i++) {
                if (i <= Math.floor(r)) h += '<i class="fa-solid fa-star" style="color:#F5A623;font-size:13px;"></i>';
                else if (i - r < 1) h += '<i class="fa-solid fa-star-half-stroke" style="color:#F5A623;font-size:13px;"></i>';
                else h += '<i class="fa-regular fa-star" style="color:#E2E8F0;font-size:13px;"></i>';
            }
            return h;
        }

        function statusBadge(approved) {
            return approved
                ? '<span class="badge badge-green">Approved</span>'
                : '<span class="badge badge-yellow">Pending</span>';
        }

        function loadReviews(filter) {
            var url = API + '/reviews';
            if (filter && filter !== 'all') url += '?status=' + filter;

            var wrapper = document.getElementById('reviews-table-wrapper');
            wrapper.innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div>';

            fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(function(r) {
                    if (!r.ok) throw new Error('Server error ' + r.status);
                    return r.json();
                })
                .then(function(reviews) {
                    allReviews = reviews;
                    renderStats(reviews);
                    renderTable(reviews);
                })
                .catch(function(err) {
                    wrapper.innerHTML = '<div class="empty-state"><i class="fa-solid fa-circle-exclamation"></i><p>Failed to load: ' + err.message + '</p></div>';
                });
        }

        function renderStats(list) {
            document.getElementById('stat-total').textContent = list.length;
            var approved = list.filter(function(r) { return r.isApproved; });
            document.getElementById('stat-approved').textContent = approved.length;
            document.getElementById('stat-pending').textContent = list.length - approved.length;
            var avg = approved.length > 0 ? (approved.reduce(function(s, r) { return s + r.rating; }, 0) / approved.length).toFixed(1) : '0.0';
            document.getElementById('stat-avg').textContent = avg;
        }

        function renderTable(list) {
            document.getElementById('rv-count').textContent = list.length;

            if (!list.length) {
                document.getElementById('reviews-table-wrapper').innerHTML = '<div class="empty-state"><i class="fa-regular fa-comment-dots"></i><p>No reviews found.</p></div>';
                return;
            }

            var html = '<table><thead><tr><th>Patient</th><th>Rating</th><th>Department</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
            list.forEach(function(r) {
                html += '<tr>' +
                    '<td><strong>' + r.name + '</strong><br><small style="color:#727780;">' + r.email + '</small></td>' +
                    '<td>' + renderStarsHTML(r.rating) + ' <small>' + r.rating + '/5</small></td>' +
                    '<td>' + (r.department || '—') + '</td>' +
                    '<td>' + new Date(r.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + '</td>' +
                    '<td>' + statusBadge(r.isApproved) + '</td>' +
                    '<td><div class="actions-cell">' +
                        '<button class="action-btn view-btn" data-id="' + r._id + '" title="View"><i class="fa-solid fa-eye"></i></button>' +
                        '<button class="action-btn toggle-btn" data-id="' + r._id + '" title="' + (r.isApproved ? 'Hide' : 'Approve') + '" style="color:' + (r.isApproved ? '#BA1A1A' : '#2E7D32') + ';"><i class="fa-solid ' + (r.isApproved ? 'fa-eye-slash' : 'fa-check') + '"></i></button>' +
                        '<button class="action-btn delete-btn" data-id="' + r._id + '" title="Delete" style="color:#BA1A1A;"><i class="fa-solid fa-trash"></i></button>' +
                    '</div></td>' +
                    '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('reviews-table-wrapper').innerHTML = html;

            // View
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { showDetail(this.getAttribute('data-id')); });
            });

            // Toggle
            document.querySelectorAll('.toggle-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { toggleReview(this.getAttribute('data-id')); });
            });

            // Delete
            document.querySelectorAll('.delete-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { deleteReview(this.getAttribute('data-id')); });
            });
        }

        function toggleReview(id) {
            fetch(API + '/reviews/' + id + '/status', {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                showToast(data.message, 'success');
                loadReviews(document.getElementById('status-filter').value);
            })
            .catch(function(err) { showToast(err.message, 'error'); });
        }

        function deleteReview(id) {
            if (!confirm('Are you sure you want to delete this review?')) return;
            fetch(API + '/reviews/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                showToast(data.message, 'success');
                loadReviews(document.getElementById('status-filter').value);
            })
            .catch(function(err) { showToast(err.message, 'error'); });
        }

        function showDetail(id) {
            var r = allReviews.find(function(rv) { return rv._id === id; });
            if (!r) return;
            var dateStr = new Date(r.createdAt).toLocaleString();
            var html =
                '<div style="display:grid;gap:14px;">' +
                    detailRow('Patient', r.name) +
                    detailRow('Email', r.email) +
                    detailRow('Rating', renderStarsHTML(r.rating) + ' ' + r.rating + '/5') +
                    detailRow('Department', r.department || '—') +
                    detailRow('Status', statusBadge(r.isApproved)) +
                    detailRow('Submitted', dateStr) +
                    '<div style="margin-top:8px;padding:16px;background:#F3FAFF;border-radius:6px;border:1px solid #C2C7D1;">' +
                        '<div style="font-size:12px;font-weight:600;color:#727780;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Review</div>' +
                        '<div style="font-size:14px;color:#071E27;line-height:1.6;">' + r.review + '</div>' +
                    '</div>' +
                '</div>';
            document.getElementById('detail-body').innerHTML = html;
            document.getElementById('detail-modal').classList.add('open');
        }

        function detailRow(label, value) {
            return '<div style="display:flex;gap:12px;"><span style="width:100px;flex-shrink:0;font-size:13px;color:#727780;font-weight:500;">' + label + '</span><span style="font-size:14px;color:#071E27;">' + value + '</span></div>';
        }

        document.getElementById('detail-modal-close').addEventListener('click', function() { document.getElementById('detail-modal').classList.remove('open'); });
        document.getElementById('detail-close-btn').addEventListener('click', function() { document.getElementById('detail-modal').classList.remove('open'); });

        document.getElementById('status-filter').addEventListener('change', function() {
            loadReviews(this.value);
        });

        loadReviews('all');
    })();
    </script>
</body>
</html>
