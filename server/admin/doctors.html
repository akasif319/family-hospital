<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doctors — Family Hospital Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>Family<span>Hospital</span></h2>
                <p>Admin Panel</p>
            </div>
            <nav class="sidebar-nav">
    <a href="dashboard.html"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
    <a href="doctors.html"><i class="fa-solid fa-user-doctor"></i> Doctors</a>
    <a href="appointments.html"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
    <a href="reviews.html"><i class="fa-solid fa-star"></i> Reviews</a>
    <a href="services.html"><i class="fa-solid fa-list-check"></i> Services</a>
</nav>
            <div class="sidebar-footer">
                <button id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <div class="page-header">
                <h1>Manage Doctors</h1>
                <button class="btn btn-primary" id="add-doctor-btn">
                    <i class="fa-solid fa-plus"></i> Add Doctor
                </button>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <h2>All Doctors (<span id="doctor-count">0</span>)</h2>
                </div>
                <div id="doctors-table-wrapper">
                    <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="doctor-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Add Doctor</h2>
                <button class="modal-close" id="modal-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="doctor-form">
                <div class="modal-body">
                    <input type="hidden" id="doctor-id">

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Full Name <span class="req">*</span></label>
                            <input type="text" class="form-input" id="f-name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Department <span class="req">*</span></label>
                            <select class="form-select" id="f-department" required>
                                <option value="">Select</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Pediatric">Pediatric</option>
                                <option value="General Medicine">General Medicine</option>
                                <option value="Emergency">Emergency</option>
                                <option value="Pulmonology">Pulmonology</option>
                                <option value="Ophthalmology">Ophthalmology</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-input" id="f-title" placeholder="e.g. Senior Cardiologist">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Gender</label>
                            <select class="form-select" id="f-gender">
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Experience</label>
                            <input type="text" class="form-input" id="f-experience" placeholder="e.g. 15+ Years">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Qualification</label>
                            <input type="text" class="form-input" id="f-qualification" placeholder="e.g. MD, FACC">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Rating (0-5)</label>
                            <input type="number" class="form-input" id="f-rating" min="0" max="5" step="0.1" value="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Reviews</label>
                            <input type="number" class="form-input" id="f-reviews" min="0" value="0">
                        </div>
                        <div class="form-group full">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-input" id="f-location" placeholder="e.g. Block A, Floor 3">
                        </div>
                        <div class="form-group full">
                            <label class="form-label">Tags (comma separated)</label>
                            <input type="text" class="form-input" id="f-tags" placeholder="e.g. Heart Failure, Arrhythmia">
                        </div>
                        <div class="form-group full">
                            <label class="form-label">Description</label>
                            <textarea class="form-textarea" id="f-description" placeholder="Brief description..."></textarea>
                        </div>
                        <div class="form-group full">
                            <label class="form-label">Image</label>
                            <div class="file-input-wrapper" id="file-wrapper">
                                <input type="file" id="f-image" accept="image/*">
                                <p><i class="fa-solid fa-cloud-arrow-up"></i> Click to upload image</p>
                                <div class="file-name" id="file-name-display"></div>
                            </div>
                            <input type="hidden" id="f-existing-image">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Featured (show on homepage)</label>
                            <select class="form-select" id="f-featured">
                                <option value="false">No</option>
                                <option value="true">Yes</option>
                            </select>
                        </div>
                    </div>

                    <label class="form-label" style="margin-bottom: 10px;">Weekly Schedule (time slots, comma separated)</label>
                    <div class="schedule-editor">
                        <div class="schedule-row"><label>Mon</label><input type="text" id="s-mon" placeholder="09:00, 09:30, 10:00"><span class="hint">HH:MM</span></div>
                        <div class="schedule-row"><label>Tue</label><input type="text" id="s-tue" placeholder="09:00, 09:30, 10:00"><span class="hint">HH:MM</span></div>
                        <div class="schedule-row"><label>Wed</label><input type="text" id="s-wed" placeholder="09:00, 09:30, 10:00"><span class="hint">HH:MM</span></div>
                        <div class="schedule-row"><label>Thu</label><input type="text" id="s-thu" placeholder="09:00, 09:30, 10:00"><span class="hint">HH:MM</span></div>
                        <div class="schedule-row"><label>Fri</label><input type="text" id="s-fri" placeholder="09:00, 09:30, 10:00"><span class="hint">HH:MM</span></div>
                        <div class="schedule-row"><label>Sat</label><input type="text" id="s-sat" placeholder="09:00, 09:30, 10:00"><span class="hint">HH:MM</span></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modal-submit">Save Doctor</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal" style="width: 420px;">
            <div class="modal-header">
                <h2>Delete Doctor</h2>
                <button class="modal-close" id="delete-modal-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <p style="font-size: 15px; margin-bottom: 4px;">Are you sure you want to delete</p>
                <p style="font-size: 16px; font-weight: 600; color: #00355F;" id="delete-doctor-name"></p>
                <p style="font-size: 13px; color: #727780; margin-top: 8px;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="delete-cancel-btn">Cancel</button>
                <button class="btn btn-danger" id="delete-confirm-btn">Delete</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/doctors.js"></script>
</body>
</html>
